apiVersion: v1.edp.epam.com/v1
kind: Keycloak
metadata:
  name: keycloak-sample
spec:
  secret: my-keycloak-secret
  url: https://example.com

---
# Password grant authentication
apiVersion: v1.edp.epam.com/v1
kind: Keycloak
metadata:
  name: keycloak-password-grant
spec:
  url: https://keycloak.example.com
  auth:
    passwordGrant:
      username:
        value: admin
      passwordRef:
        name: keycloak-access
        key: password

---
# Client credentials authentication
apiVersion: v1.edp.epam.com/v1
kind: Keycloak
metadata:
  name: keycloak-client-creds
spec:
  url: https://keycloak.example.com
  auth:
    clientCredentials:
      clientId:
        value: my-admin-client
      clientSecretRef:
        name: keycloak-client-secret
        key: client-secret
