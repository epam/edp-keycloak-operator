style: none
template: CHANGELOG.tpl.md
info:
  title: CHANGELOG
  repository_url: https://github.com/epam/edp-keycloak-operator

options:
  tag_filter_pattern: '^v'
  sort: "semVer"

  commits:
    filters:
      Type:
        - build
        - chore
        - ci
        - docs
        - feat
        - fix
        - perf
        - refactor
        - revert
        - style
        - test

  commit_groups:
    group_by: Type
    sort_by: Custom
    title_order:
      - feat
      - fix
      - perf
      - refactor
      - style
      - test
      - build
      - ci
      - chore
      - docs
      - revert
    title_maps:
      build: Build
      chore: Routine
      ci: Continuous Integration
      docs: Documentation
      feat: Features
      fix: Bug Fixes
      perf: Performance Improvements
      refactor: Code Refactoring
      revert: Reverts
      style: Formatting
      test: Testing

  header:
    pattern: "^(feat|fix|docs|style|refactor|perf|test|chore|build|ci|revert)(?:\\(([^)]+)\\))?!?:\\s+(.*)$"
    pattern_maps:
      - Type
      - Scope
      - Subject

  notes:
    keywords:
      - "BREAKING CHANGE:"
